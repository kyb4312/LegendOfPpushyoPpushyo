<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뿌셔뿌셔 서바이벌 / プシェプシェサバイバル</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a0a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Noto Sans KR', 'Noto Sans JP', sans-serif;
  overflow: hidden;
}
canvas { display: block; image-rendering: pixelated; }
#gameContainer {
  position: relative;
  width: 800px;
  height: 600px;
}
canvas {
  width: 800px;
  height: 600px;
  border: 3px solid #ff6b6b;
  border-radius: 8px;
  box-shadow: 0 0 30px rgba(255, 107, 107, 0.3);
}
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>
<script>
// ============================================================
// PPUSHYO PPUSHYO SURVIVAL - Complete Mini-Game Prototype
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

// --- LANGUAGE SYSTEM ---
let lang = localStorage.getItem('ppushyo_lang') || 'ko';

let T = {};

function t(key) { return (T[key] && T[key][lang]) || (T[key] && T[key]['ko']) || key; }

// --- GAME STATE ---
const STATE = {
  TITLE: 'title',
  STAGE_INTRO: 'stage_intro',
  PLAYING: 'playing',
  ENDING: 'ending',
  GAME_OVER: 'game_over',
  HELP: 'help',
  BONUS_INTRO: 'bonus_intro',
  BONUS: 'bonus',
  BONUS_RESULT: 'bonus_result'
};
let helpPage = 0;
const HELP_PAGES = 8;

let gameState = STATE.TITLE;
let currentStage = 0;
let score = 0;
let highScores = JSON.parse(localStorage.getItem('ppushyo_highscores2') || '[]');

function saveHighScore(s) {
  const qualifies = highScores.length < 3 || s > highScores[highScores.length - 1].score;
  if (qualifies && s > 0) {
    const name = (prompt('HIGH SCORE! Enter your name:', 'AAA') || 'AAA').substring(0, 6).toUpperCase();
    highScores.push({ name, score: s });
    highScores.sort((a, b) => b.score - a.score);
    highScores = highScores.slice(0, 3);
    localStorage.setItem('ppushyo_highscores2', JSON.stringify(highScores));
  }
}
let hp = 3;
let stageTimer = 0;
let introTimer = 0;
let spiceCollected = 0;
let deathCause = '';
let deathStage = 0;
let keys = {};
let mouseX = 0, mouseY = 0;
let mouseDown = false;
let mousePath = [];
let frameCount = 0;

// Ending collection (localStorage)
let endingsFound = JSON.parse(localStorage.getItem('ppushyo_endings') || '{}');

// --- STAGE DATA ---
const STAGES = [
  { nameKey: 's1_name', subKey: 's1_sub' },
  { nameKey: 's2_name', subKey: 's2_sub' },
  { nameKey: 's3_name', subKey: 's3_sub' },
  { nameKey: 's4_name', subKey: 's4_sub' },
  { nameKey: 's6_name', subKey: 's6_sub' },
  { nameKey: 's5_name', subKey: 's5_sub' }
];

const ENDINGS = [
  { id: 'archer', titleKey: 'e_archer_title', descKey: 'e_archer_desc', emoji: '🏹' },
  { id: 'insta', titleKey: 'e_insta_title', descKey: 'e_insta_desc', emoji: '📷' },
  { id: 'dessert', titleKey: 'e_dessert_title', descKey: 'e_dessert_desc', emoji: '☕' },
  { id: 'pigeon', titleKey: 'e_pigeon_title', descKey: 'e_pigeon_desc', emoji: '🕊️' },
  { id: 'haechi', titleKey: 'e_haechi_title', descKey: 'e_haechi_desc', emoji: '🦁' },
  { id: 'legend', titleKey: 'e_legend_title', descKey: 'e_legend_desc', emoji: '🏆' },
  { id: 'japan', titleKey: 'e_japan_title', descKey: 'e_japan_desc', emoji: '🇯🇵' },
  { id: 'rhythm', titleKey: 'e_rhythm_title', descKey: 'e_rhythm_desc', emoji: '🎵' }
];

// --- INPUT ---
let keysJustPressed = {};
document.addEventListener('keydown', e => {
  if (!keys[e.code]) keysJustPressed[e.code] = true;
  keys[e.code] = true;
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (W / rect.width);
  mouseY = (e.clientY - rect.top) * (H / rect.height);
  if (mouseDown) mousePath.push({ x: mouseX, y: mouseY, t: Date.now() });
});
canvas.addEventListener('mousedown', e => {
  mouseDown = true;
  mousePath = [{ x: mouseX, y: mouseY, t: Date.now() }];
});
canvas.addEventListener('mouseup', () => { mouseDown = false; });
canvas.addEventListener('click', handleClick);

// Touch support
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  mouseX = (touch.clientX - rect.left) * (W / rect.width);
  mouseY = (touch.clientY - rect.top) * (H / rect.height);
  mouseDown = true;
  mousePath = [{ x: mouseX, y: mouseY, t: Date.now() }];
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  mouseX = (touch.clientX - rect.left) * (W / rect.width);
  mouseY = (touch.clientY - rect.top) * (H / rect.height);
  if (mouseDown) mousePath.push({ x: mouseX, y: mouseY, t: Date.now() });
});
canvas.addEventListener('touchend', e => { e.preventDefault(); mouseDown = false; });

function handleClick(e) {
  const rect = canvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left) * (W / rect.width);
  const cy = (e.clientY - rect.top) * (H / rect.height);

  // Language buttons (top-right, visible on all screens)
  if (gameState === STATE.TITLE) {
    const langs = ['ko', 'jp', 'en'];
    const labels = ['한국어', '日本語', 'EN'];
    for (let i = 0; i < 3; i++) {
      const lbx = 610 + i * 60, lby = 10, lbw = 55, lbh = 25;
      if (cx > lbx && cx < lbx + lbw && cy > lby && cy < lby + lbh) {
        lang = langs[i];
        localStorage.setItem('ppushyo_lang', lang);
        return;
      }
    }
    // Start button
    if (cx > 300 && cx < 500 && cy > 350 && cy < 400) {
      startGame();
    }
    // Help button
    if (cx > 300 && cx < 500 && cy > 410 && cy < 450) {
      helpPage = 0;
      gameState = STATE.HELP;
    }
    // Bonus button (quick access to rhythm stage)
    if (cx > 300 && cx < 500 && cy > 460 && cy < 500) {
      startAtStage(4);
    }
    // Dev stage select buttons
    for (let i = 0; i < 6; i++) {
      const bx = 100 + i * 55, by = 580, bw = 45, bh = 18;
      if (cx > bx && cx < bx + bw && cy > by && cy < by + bh) {
        startAtStage(i);
      }
    }
  } else if (gameState === STATE.HELP) {
    // Back button
    if (cx > 320 && cx < 480 && cy > 545 && cy < 585) {
      gameState = STATE.TITLE;
    }
    // Prev button
    if (cx > 50 && cx < 150 && cy > 545 && cy < 585 && helpPage > 0) {
      helpPage--;
    }
    // Next button
    if (cx > 650 && cx < 750 && cy > 545 && cy < 585 && helpPage < HELP_PAGES - 1) {
      helpPage++;
    }
  } else if (gameState === STATE.ENDING) {
    // Restart button
    if (cx > 250 && cx < 550 && cy > 510 && cy < 560) {
      gameState = STATE.TITLE;
    }
  }
}

// --- UTILITY ---
function drawText(text, x, y, size, color, align, maxWidth) {
  ctx.fillStyle = color || '#fff';
  ctx.font = `bold ${size}px 'Noto Sans KR', 'Noto Sans JP', sans-serif`;
  ctx.textAlign = align || 'center';
  ctx.textBaseline = 'middle';
  if (maxWidth) {
    ctx.fillText(text, x, y, maxWidth);
  } else {
    ctx.fillText(text, x, y);
  }
}

function drawBilingual(ko, jp, x, y, sizeKo, sizeJp, color, en) {
  if (lang === 'en' && en) {
    drawText(en, x, y, sizeKo, color);
  } else if (lang === 'jp') {
    drawText(jp, x, y, sizeKo, color);
  } else if (lang === 'ko') {
    drawText(ko, x, y, sizeKo, color);
  } else {
    drawText(ko, x, y - sizeJp * 0.4, sizeKo, color);
    drawText(jp, x, y + sizeKo * 0.5, sizeJp, color || 'rgba(255,255,255,0.7)');
  }
}

function drawEmoji(emoji, x, y, size) {
  ctx.font = `${size}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, x, y);
}

function rectCollision(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function lerp(a, b, t) { return a + (b - a) * t; }

function drawPalaceRoof(x, y, w) {
  ctx.fillStyle = '#c0392b';
  ctx.beginPath();
  ctx.moveTo(x - w * 0.6, y + 30);
  ctx.quadraticCurveTo(x, y - 20, x + w * 0.6, y + 30);
  ctx.fill();
  ctx.fillStyle = '#2c3e50';
  ctx.fillRect(x - w * 0.5, y + 30, w, 8);
  // Decorative lines
  ctx.strokeStyle = '#e74c3c';
  ctx.lineWidth = 2;
  for (let i = 0; i < 5; i++) {
    const lx = x - w * 0.4 + i * (w * 0.8 / 4);
    ctx.beginPath();
    ctx.moveTo(lx, y + 30);
    ctx.lineTo(lx, y + 38);
    ctx.stroke();
  }
}

// --- PLAYER ---
let player = { x: 380, y: 500, w: 40, h: 40, vx: 0, vy: 0 };
const playerImg = new Image();
playerImg.src = 'ppushyo.PNG';
let playerImgLoaded = false;
playerImg.onload = () => { playerImgLoaded = true; };

function drawPlayer(x, y, size) {
  const s = size || 40;
  const rx = x - s / 2, ry = y - s / 2;
  if (playerImgLoaded) {
    ctx.drawImage(playerImg, rx, ry, s, s);
  } else {
    ctx.fillStyle = '#ff8c00';
    ctx.fillRect(rx, ry, s, s);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.floor(s * 0.25)}px 'Noto Sans KR', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('뿌셔', x, y);
  }
  // Cracks based on missing HP
  const cracks = 3 - hp;
  ctx.strokeStyle = '#ff0000';
  ctx.lineWidth = 2;
  for (let i = 0; i < cracks; i++) {
    ctx.beginPath();
    const cx = rx + 5 + i * 12;
    const cy = ry + 5;
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + 5, cy + 10);
    ctx.lineTo(cx + 2, cy + 20);
    ctx.stroke();
  }
}

// --- HUD ---
function drawHUD() {
  // Background bar
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, 50);

  // HP hearts
  for (let i = 0; i < 3; i++) {
    drawEmoji(i < hp ? '❤️' : '🖤', 30 + i * 35, 25, 24);
  }

  // Score
  drawText(`${t('score')}: ${score}`, 200, 25, 18, '#ffeb3b', 'left');

  // Stage name
  if (currentStage < STAGES.length) {
    const st = STAGES[currentStage];
    drawText(t(st.nameKey), W / 2, 25, 14, '#ff6b6b');
  }

  // Spice count (Stage 1)
  if (currentStage === 0) {
    drawText(`🌶️ x ${spiceCollected}`, W - 80, 25, 16, '#ff5722', 'center');
  }
}

// ============================================================
// TITLE SCREEN
// ============================================================
let titlePulse = 0;
function drawTitle() {
  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a0a2e');
  grad.addColorStop(0.5, '#2d1b69');
  grad.addColorStop(1, '#1a0a2e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Language buttons (top-right)
  const langs = ['ko', 'jp', 'en'];
  const labels = ['한국어', '日本語', 'EN'];
  for (let i = 0; i < 3; i++) {
    const lbx = 610 + i * 60, lby = 10, lbw = 55, lbh = 25;
    const lHover = mouseX > lbx && mouseX < lbx + lbw && mouseY > lby && mouseY < lby + lbh;
    const selected = lang === langs[i];
    ctx.fillStyle = selected ? '#ff6b6b' : (lHover ? '#5e35b1' : 'rgba(255,255,255,0.15)');
    ctx.beginPath();
    ctx.roundRect(lbx, lby, lbw, lbh, 5);
    ctx.fill();
    drawText(labels[i], lbx + lbw / 2, lby + lbh / 2, 11, selected ? '#fff' : '#bbb');
  }

  // Palace roof decoration
  drawPalaceRoof(W / 2, 60, 300);

  // Floating noodles
  for (let i = 0; i < 8; i++) {
    const nx = 100 + i * 90;
    const ny = 120 + Math.sin(frameCount * 0.02 + i) * 20;
    drawEmoji('🍜', nx, ny, 30);
  }

  titlePulse = Math.sin(frameCount * 0.05) * 0.1 + 1;

  // Title
  ctx.save();
  ctx.translate(W / 2, 210);
  ctx.scale(titlePulse, titlePulse);
  drawText(t('title'), 0, 0, 42, '#ff6b6b');
  ctx.restore();

  // Subtitle
  drawText(t('subtitle'), W / 2, 260, 16, '#b39ddb');

  // Player character preview
  drawPlayer(W / 2, 300, 40);

  // Start button
  const bx = 300, by = 350, bw = 200, bh = 50;
  const hover = mouseX > bx && mouseX < bx + bw && mouseY > by && mouseY < by + bh;
  ctx.fillStyle = hover ? '#e74c3c' : '#c0392b';
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 10);
  ctx.fill();
  ctx.strokeStyle = '#ff6b6b';
  ctx.lineWidth = 2;
  ctx.stroke();
  drawText(t('start'), W / 2, 375, 20, '#fff');

  // Help button
  const hbx = 300, hby = 410, hbw = 200, hbh = 40;
  const hHover = mouseX > hbx && mouseX < hbx + hbw && mouseY > hby && mouseY < hby + hbh;
  ctx.fillStyle = hHover ? '#1565c0' : '#0d47a1';
  ctx.beginPath();
  ctx.roundRect(hbx, hby, hbw, hbh, 10);
  ctx.fill();
  ctx.strokeStyle = '#42a5f5';
  ctx.lineWidth = 2;
  ctx.stroke();
  drawText(t('help'), W / 2, 430, 16, '#fff');

  // Bonus button
  const bbx = 300, bby = 460, bbw = 200, bbh = 40;
  const bHover = mouseX > bbx && mouseX < bbx + bbw && mouseY > bby && mouseY < bby + bbh;
  ctx.fillStyle = bHover ? '#e65100' : '#bf360c';
  ctx.beginPath();
  ctx.roundRect(bbx, bby, bbw, bbh, 10);
  ctx.fill();
  ctx.strokeStyle = '#ff9800';
  ctx.lineWidth = 2;
  ctx.stroke();
  drawText(t('bonus'), W / 2, 480, 16, '#fff');

  // Ending collection
  const found = Object.keys(endingsFound).length;
  drawText(`${found} / 8 ${t('ending_collect')}`, W / 2, 520, 14, '#9e9e9e');

  // Ending icons
  for (let i = 0; i < 8; i++) {
    const ex = W / 2 - 122.5 + i * 35;
    const ey = 545;
    if (endingsFound[ENDINGS[i].id]) {
      drawEmoji(ENDINGS[i].emoji, ex, ey, 22);
    } else {
      drawText('?', ex, ey, 18, '#555');
    }
  }

  // Controls hint
  drawText(t('controls_hint'), W / 2, 572, 11, '#666');

  // Dev stage select buttons
  drawText(t('dev'), 70, 590, 10, '#555');
  for (let i = 0; i < 6; i++) {
    const dbx = 100 + i * 55, dby = 580, dbw = 45, dbh = 18;
    const dHover = mouseX > dbx && mouseX < dbx + dbw && mouseY > dby && mouseY < dby + dbh;
    ctx.fillStyle = dHover ? '#5e35b1' : '#311b92';
    ctx.beginPath();
    ctx.roundRect(dbx, dby, dbw, dbh, 4);
    ctx.fill();
    drawText(`S${i + 1}`, dbx + dbw / 2, dby + dbh / 2, 11, '#ce93d8');
  }
}

// ============================================================
// STAGE INTRO
// ============================================================
const STAGE_CONTROLS = [
  { icon: '⌨️', text: '← → ↑ ↓ / WASD' },
  { icon: '🖱️', text: 'Mouse Drag (⚡Energy)' },
  { icon: '⌨️', text: 'A  S  D  F' },
  { icon: '⌨️', text: '← →  +  Space ×2~3' },
  { icon: '⌨️', text: 'Space (Timing)  /  Hold+Release' },
  { icon: '⌨️', text: 'Hold Space = Move  /  Release = Stop' },
];

function drawStageIntro() {
  ctx.fillStyle = '#1a0a2e';
  ctx.fillRect(0, 0, W, H);

  const st = STAGES[currentStage];
  const progress = Math.min(introTimer / 30, 1);

  // Stage number
  drawText(`${t('stage')} ${currentStage + 1}`, W / 2, 150, 30, `rgba(255,107,107,${progress})`);

  // Stage name
  drawText(t(st.nameKey), W / 2, 220, 48, `rgba(255,255,255,${progress})`);

  // Subtitle (mission)
  drawText(t(st.subKey), W / 2, 290, 20, `rgba(189,189,189,${progress})`);

  // Controls box
  if (introTimer > 30) {
    const ctrl = STAGE_CONTROLS[currentStage] || STAGE_CONTROLS[0];
    const boxAlpha = Math.min(1, (introTimer - 30) / 30);
    ctx.fillStyle = `rgba(255,255,255,${boxAlpha * 0.08})`;
    ctx.beginPath();
    ctx.roundRect(150, 340, 500, 80, 12);
    ctx.fill();
    ctx.strokeStyle = `rgba(255,255,255,${boxAlpha * 0.2})`;
    ctx.lineWidth = 1;
    ctx.stroke();
    drawText(ctrl.icon, W / 2, 365, 20, `rgba(255,255,255,${boxAlpha * 0.9})`);
    drawText(ctrl.text, W / 2, 395, 18, `rgba(255,235,59,${boxAlpha})`);
  }

  // "Press SPACE to start" (blink)
  if (introTimer > 60) {
    const blink = Math.sin(frameCount * 0.08) * 0.3 + 0.7;
    drawText('press SPACE to start', W / 2, 480, 18, `rgba(255,255,255,${blink})`);
  }

  introTimer++;
  // Wait for Space press (after initial animation)
  if (introTimer > 60 && keysJustPressed['Space']) {
    gameState = STATE.PLAYING;
    initStage(currentStage);
  }
}

// ============================================================
// START GAME
// ============================================================
function startGame() {
  gameState = STATE.STAGE_INTRO;
  currentStage = 0;
  score = 0;
  hp = 3;
  spiceCollected = 0;
  deathCause = '';
  deathStage = 0;
  introTimer = 0;
}

function startAtStage(n) {
  gameState = STATE.STAGE_INTRO;
  currentStage = n;
  score = 0;
  hp = 3;
  spiceCollected = 0;
  deathCause = '';
  deathStage = 0;
  introTimer = 0;
}

function advanceStage() {
  currentStage++;
  if (currentStage >= 6) {
    // Victory!
    triggerEnding('victory');
    return;
  }
  gameState = STATE.STAGE_INTRO;
  introTimer = 0;
}

function takeDamage(cause) {
  hp--;
  if (hp <= 0) {
    deathCause = cause;
    deathStage = currentStage;
    triggerEnding('death');
  }
}

function triggerEnding(type) {
  let endingIndex = 5; // default: legend
  if (type === 'death') {
    if (deathStage === 0 && (deathCause === 'tourist' || deathCause === 'camera')) endingIndex = 1; // insta
    else if (deathStage === 0 && deathCause === 'pigeon') endingIndex = 3; // pigeon
    else if (deathStage === 1) endingIndex = 0; // archer
    else if (deathStage === 2) endingIndex = 2; // dessert (coffee stage)
    else if (deathStage === 3) endingIndex = 0; // default to archer for boss
    else if (deathStage === 4) endingIndex = 7; // rhythm
    else if (deathStage === 5) endingIndex = 4; // haechi
  } else if (type === 'victory') {
    if (spiceCollected >= 5) endingIndex = 6; // hidden japan ending
    else endingIndex = 5; // legend
  }
  currentEnding = ENDINGS[endingIndex];
  endingsFound[currentEnding.id] = true;
  localStorage.setItem('ppushyo_endings', JSON.stringify(endingsFound));
  saveHighScore(score);
  gameState = STATE.ENDING;
}

// ============================================================
// ENDING SCREEN
// ============================================================
let currentEnding = null;
let endingTimer = 0;

function drawEnding() {
  endingTimer++;
  const e = currentEnding;

  // Background
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a0a2e');
  grad.addColorStop(1, '#0d0521');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (let i = 0; i < 30; i++) {
    const sx = (i * 137 + frameCount * 0.3) % W;
    const sy = (i * 97) % (H * 0.4);
    ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.sin(frameCount * 0.05 + i) * 0.3})`;
    ctx.fillRect(sx, sy, 2, 2);
  }

  // Emoji
  const ey = 130 + Math.sin(frameCount * 0.03) * 10;
  drawEmoji(e.emoji, W / 2, ey, 60);

  // Ending title
  drawText(t('ending_label'), W / 2, 200, 16, '#ff6b6b');
  drawText(t(e.titleKey), W / 2, 250, 36, '#ffd54f');

  // Description
  wrapText(t(e.descKey), W / 2, 330, 16, '#e0e0e0', 600);

  // Score
  drawText(`${t('score')}: ${score}`, W / 2, 390, 20, '#ffeb3b');

  // High scores TOP 3
  drawText('🏅 TOP 3', W / 2, 420, 14, '#9e9e9e');
  const medals = ['🥇', '🥈', '🥉'];
  for (let i = 0; i < 3; i++) {
    const hs = highScores[i];
    const isNew = hs && hs.score === score;
    const color = isNew ? '#ffd54f' : '#bdbdbd';
    const label = hs ? `${medals[i]} ${hs.name} — ${hs.score}` : `${medals[i]} ---`;
    drawText(label, W / 2, 442 + i * 20, 14, color);
  }

  // Restart button
  const bx = 250, by = 510, bw = 300, bh = 50;
  const hover = mouseX > bx && mouseX < bx + bw && mouseY > by && mouseY < by + bh;
  ctx.fillStyle = hover ? '#7b1fa2' : '#4a148c';
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 10);
  ctx.fill();
  drawText(t('restart'), W / 2, by + 25, 18, '#fff');
}

function wrapText(text, x, y, size, color, maxW) {
  ctx.fillStyle = color;
  ctx.font = `${size}px 'Noto Sans KR', 'Noto Sans JP', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // Simple wrap
  const words = text.split('');
  let line = '';
  let ly = y;
  for (let i = 0; i < words.length; i++) {
    const test = line + words[i];
    if (ctx.measureText(test).width > maxW) {
      ctx.fillText(line, x, ly);
      line = words[i];
      ly += size + 4;
    } else {
      line = test;
    }
  }
  ctx.fillText(line, x, ly);
}

let s1 = {};
function initStage1() {
  s1 = {
    playerX: W / 2,
    playerY: H - 80,
    obstacles: [],
    spices: [],
    spawnTimer: 0,
    scrollY: 0,
    timer: 0,
    duration: 1200, // 20 seconds at 60fps
    invincible: 0,
    bgElements: []
  };
  // Pre-generate background elements
  for (let i = 0; i < 10; i++) {
    s1.bgElements.push({
      x: Math.random() * W,
      y: Math.random() * H,
      type: Math.random() > 0.5 ? 'tree' : 'pillar'
    });
  }
  player.x = W / 2 - 20;
  player.y = H - 80;
}

function updateStage1() {
  s1.timer++;
  s1.scrollY += 3;
  if (s1.invincible > 0) s1.invincible--;

  // Player movement
  const speed = 5;
  if (keys['ArrowLeft'] || keys['KeyA']) s1.playerX -= speed;
  if (keys['ArrowRight'] || keys['KeyD']) s1.playerX += speed;
  if (keys['ArrowUp'] || keys['KeyW']) s1.playerY -= speed;
  if (keys['ArrowDown'] || keys['KeyS']) s1.playerY += speed;
  s1.playerX = Math.max(30, Math.min(W - 30, s1.playerX));
  s1.playerY = Math.max(80, Math.min(H - 40, s1.playerY));

  // Spawn obstacles
  s1.spawnTimer++;
  if (s1.spawnTimer > 20) {
    s1.spawnTimer = 0;
    const types = ['tourist', 'pigeon', 'camera'];
    const emojis = ['👣', '🕊️', '📷'];
    const ti = Math.floor(Math.random() * 3);
    s1.obstacles.push({
      x: Math.random() * (W - 60) + 30,
      y: -30,
      type: types[ti],
      emoji: emojis[ti],
      speed: 3 + Math.random() * 4
    });
  }

  // Spawn spices (rarer)
  if (s1.spawnTimer === 15 && Math.random() < 0.25) {
    s1.spices.push({
      x: Math.random() * (W - 60) + 30,
      y: -30,
      speed: 2
    });
  }

  // Update obstacles
  const pRect = { x: s1.playerX - 15, y: s1.playerY - 15, w: 30, h: 30 };
  s1.obstacles = s1.obstacles.filter(o => {
    o.y += o.speed;
    if (o.y > H + 30) return false;
    const oRect = { x: o.x - 15, y: o.y - 15, w: 30, h: 30 };
    if (rectCollision(pRect, oRect) && s1.invincible <= 0) {
      takeDamage(o.type);
      s1.invincible = 60;
      return false;
    }
    return true;
  });

  // Update spices
  s1.spices = s1.spices.filter(sp => {
    sp.y += sp.speed;
    if (sp.y > H + 30) return false;
    const sRect = { x: sp.x - 12, y: sp.y - 12, w: 24, h: 24 };
    if (rectCollision(pRect, sRect)) {
      spiceCollected++;
      score += 100;
      return false;
    }
    return true;
  });

  // Stage complete
  if (s1.timer >= s1.duration && hp > 0) {
    advanceStage();
  }
}

function drawStage1() {
  // Background: palace ground
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a472a');
  grad.addColorStop(0.3, '#2d6a4f');
  grad.addColorStop(1, '#52796f');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Ground path
  ctx.fillStyle = '#d4a76a';
  ctx.fillRect(100, 0, W - 200, H);
  ctx.fillStyle = '#c49a5e';
  for (let y = -s1.scrollY % 60; y < H; y += 60) {
    ctx.fillRect(100, y, W - 200, 2);
  }

  // Palace background elements
  drawPalaceRoof(200, 20 + (s1.scrollY * 0.1) % 40, 120);
  drawPalaceRoof(600, 30 + (s1.scrollY * 0.1) % 50, 100);
  drawPalaceRoof(400, 10 + (s1.scrollY * 0.05) % 30, 180);

  // Trees on sides
  for (let y = -s1.scrollY % 120; y < H; y += 120) {
    drawEmoji('🌳', 60, y, 30);
    drawEmoji('🌳', W - 60, y, 30);
  }

  // Obstacles
  s1.obstacles.forEach(o => {
    drawEmoji(o.emoji, o.x, o.y, 32);
  });

  // Spices
  s1.spices.forEach(sp => {
    drawEmoji('🌶️', sp.x, sp.y, 24);
    // Glow
    ctx.fillStyle = 'rgba(255,87,34,0.3)';
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, 18, 0, Math.PI * 2);
    ctx.fill();
  });

  // Player
  const blink = s1.invincible > 0 && Math.floor(s1.invincible / 4) % 2;
  if (!blink) drawPlayer(s1.playerX, s1.playerY, 36);

  // Progress bar
  const prog = s1.timer / s1.duration;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(50, H - 20, W - 100, 10);
  ctx.fillStyle = '#4caf50';
  ctx.fillRect(50, H - 20, (W - 100) * prog, 10);
}

let s2 = {};
function initStage2() {
  s2 = {
    arrows: [],
    spawnTimer: 0,
    timer: 0,
    duration: 1200,
    sliceTrail: [],
    combo: 0,
    comboTimer: 0,
    comboText: '',
    invincible: 0,
    energy: 100,
    maxEnergy: 100
  };
}

function updateStage2() {
  s2.timer++;
  if (s2.invincible > 0) s2.invincible--;
  if (s2.comboTimer > 0) s2.comboTimer--;

  // Spawn arrows
  s2.spawnTimer++;
  const spawnRate = Math.max(6, 22 - Math.floor(s2.timer / 120) * 2);
  if (s2.spawnTimer >= spawnRate) {
    s2.spawnTimer = 0;
    const fromLeft = Math.random() > 0.5;
    const isBomb = Math.random() < 0.15;
    const ax = fromLeft ? -20 : W + 20;
    const ay = 100 + Math.random() * 350;
    const spd = 4 + Math.random() * 4;
    let avx, avy, aAngle;
    if (Math.random() < 0.65) {
      // Aimed at player (with spread)
      const tx = W / 2 + (Math.random() - 0.5) * 80;
      const ty = H - 60 + (Math.random() - 0.5) * 60;
      const dx = tx - ax, dy = ty - ay;
      const dist = Math.hypot(dx, dy);
      avx = (dx / dist) * spd;
      avy = (dy / dist) * spd;
      aAngle = Math.atan2(dy, dx);
    } else {
      // Random direction
      avx = (fromLeft ? 1 : -1) * spd;
      avy = Math.random() * 2 - 1;
      aAngle = fromLeft ? 0 : Math.PI;
    }
    s2.arrows.push({
      x: ax, y: ay, vx: avx, vy: avy,
      alive: true, sliced: false, sliceAnim: 0,
      angle: aAngle, bomb: isBomb
    });
  }

  // Update arrows
  s2.arrows = s2.arrows.filter(a => {
    if (a.sliced) {
      a.sliceAnim++;
      a.y += 5;
      a.x += a.vx * 0.5;
      return a.sliceAnim < 30;
    }
    a.x += a.vx;
    a.y += a.vy;
    // Check if arrow hit player area (bombs pass through)
    if (!a.bomb && a.x > 340 && a.x < 460 && a.y > 470 && a.alive) {
      if (s2.invincible <= 0) {
        takeDamage('arrow');
        s2.invincible = 60;
      }
      return false;
    }
    return a.x > -50 && a.x < W + 50 && a.y < H + 50;
  });

  // Energy system: drain while slicing, recharge while idle
  if (mouseDown && s2.energy > 0) {
    s2.energy = Math.max(0, s2.energy - 1.2);
  } else if (!mouseDown) {
    s2.energy = Math.min(s2.maxEnergy, s2.energy + 0.6);
  }

  // Slice detection (only when energy > 0)
  if (mouseDown && mousePath.length > 2 && s2.energy > 0) {
    const now = Date.now();
    const recentPath = mousePath.filter(p => now - p.t < 100);
    if (recentPath.length >= 2) {
      let slicedThisFrame = 0;
      s2.arrows.forEach(a => {
        if (a.sliced) return;
        for (let i = 1; i < recentPath.length; i++) {
          const p1 = recentPath[i - 1];
          const p2 = recentPath[i];
          const dist = pointToSegmentDist(a.x, a.y, p1.x, p1.y, p2.x, p2.y);
          if (dist < 30) {
            a.sliced = true;
            a.sliceAnim = 0;
            if (a.bomb) {
              score -= 200;
              takeDamage('arrow');
              s2.invincible = 60;
            } else {
              slicedThisFrame++;
              score += 50;
            }
            break;
          }
        }
      });
      if (slicedThisFrame > 0) {
        s2.combo += slicedThisFrame;
        s2.comboTimer = 60;
        if (slicedThisFrame > 1) {
          score += slicedThisFrame * 30; // combo bonus
          s2.comboText = `COMBO x${s2.combo}!`;
        }
      } else if (s2.comboTimer <= 0) {
        s2.combo = 0;
      }
    }
  }

  // Slice trail fade
  s2.sliceTrail = s2.energy > 0 ? mousePath.filter(p => Date.now() - p.t < 100) : [];

  if (s2.timer >= s2.duration && hp > 0) advanceStage();
}

function pointToSegmentDist(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const len2 = dx * dx + dy * dy;
  if (len2 === 0) return Math.hypot(px - ax, py - ay);
  let t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / len2));
  return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
}

function drawStage2() {
  // Background: archery range
  ctx.fillStyle = '#1b5e20';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#2e7d32';

  // Player at bottom center
  drawPlayer(W / 2, H - 60, 40);

  // Arrows
  s2.arrows.forEach(a => {
    ctx.save();
    ctx.translate(a.x, a.y);
    if (a.sliced) {
      ctx.globalAlpha = 1 - a.sliceAnim / 30;
      ctx.rotate(a.sliceAnim * 0.1);
      drawEmoji(a.bomb ? '💥' : '💥', 0, 0, 30);
    } else {
      ctx.rotate(a.bomb ? 0 : a.angle);
      drawEmoji(a.bomb ? '💣' : '🏹', 0, 0, 32);
    }
    ctx.restore();
  });

  // Slice trail
  if (s2.sliceTrail.length > 1) {
    ctx.strokeStyle = 'rgba(255, 255, 100, 0.8)';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(s2.sliceTrail[0].x, s2.sliceTrail[0].y);
    s2.sliceTrail.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.stroke();
    // Glow
    ctx.strokeStyle = 'rgba(255, 255, 100, 0.3)';
    ctx.lineWidth = 12;
    ctx.stroke();
  }

  // Combo text
  if (s2.comboTimer > 0 && s2.comboText) {
    const alpha = Math.min(1, s2.comboTimer / 30);
    drawText(s2.comboText, W / 2, 200, 36, `rgba(255,235,59,${alpha})`);
  }

  // Hint
  if (s2.timer < 120) {
    drawText(t('slice_arrows'), W / 2, H / 2, 18, 'rgba(255,255,255,0.7)');
  }

  // Energy bar (right side)
  const ePct = s2.energy / s2.maxEnergy;
  const eBarX = W - 40, eBarY = 100, eBarH = 300;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(eBarX - 8, eBarY, 16, eBarH);
  ctx.fillStyle = ePct > 0.3 ? '#42a5f5' : ePct > 0.1 ? '#ff9800' : '#f44336';
  ctx.fillRect(eBarX - 6, eBarY + eBarH * (1 - ePct), 12, eBarH * ePct);
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(eBarX - 8, eBarY, 16, eBarH);
  drawText('⚡', eBarX, eBarY - 15, 14, ePct > 0.1 ? '#42a5f5' : '#f44336');

  // Progress bar
  const prog = s2.timer / s2.duration;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(50, H - 20, W - 100, 10);
  ctx.fillStyle = '#ff9800';
  ctx.fillRect(50, H - 20, (W - 100) * prog, 10);
}

// STAGE 3: RED LIGHT GREEN LIGHT
// ============================================================
let s3 = {};
function initStage3() {
  const rowLen = W - 160; // 640px per row
  s3 = {
    distance: 0,
    rowLen: rowLen,
    totalDist: rowLen * 3, // 3 rows = 1920px
    rows: [
      { y: 290, dir: 1 },   // left to right
      { y: 380, dir: -1 },  // right to left
      { y: 470, dir: 1 },   // left to right
    ],
    pathStartX: 80,
    pathEndX: W - 80,
    looking: false,
    lookTimer: 0,
    lookDuration: 80,
    phase: 'transition', // transition (move + letters) or red (stop)
    phaseTimer: 0,
    haechiAngle: 0,
    moving: false,
    invincible: 0,
    won: false,
    chant: '무궁화꽃이피었습니다',
    litChars: 0,
    transitionDuration: 120
  };
}

function getS3Pos(dist) {
  const d = Math.max(0, Math.min(dist, s3.totalDist));
  const row = Math.min(2, Math.floor(d / s3.rowLen));
  const rowDist = d - row * s3.rowLen;
  const rowData = s3.rows[row];
  const x = rowData.dir === 1
    ? s3.pathStartX + rowDist
    : s3.pathEndX - rowDist;
  return { x, y: rowData.y, row };
}

function updateStage3() {
  // Handle win animation separately
  if (s3.won) {
    s3.winTimer = (s3.winTimer || 0) + 1;
    if (s3.winTimer > 60 && hp > 0) advanceStage();
    return;
  }
  if (s3.invincible > 0) s3.invincible--;

  // Progress: 0 (start) to 1 (end)
  const progress = Math.min(1, s3.distance / s3.totalDist);

  // Phase cycling: transition (움직여! + 글자 점등) ↔ red (멈춰!)
  s3.phaseTimer++;
  if (s3.phase === 'transition') {
    // Can move, letters lighting up
    s3.looking = false;
    s3.litChars = Math.min(s3.chant.length, Math.floor((s3.phaseTimer / s3.transitionDuration) * s3.chant.length));
    if (s3.phaseTimer >= s3.transitionDuration) {
      s3.phase = 'red';
      s3.phaseTimer = 0;
      // 빨간불도 랜덤: 0.3~2초
      s3.lookDuration = 20 + Math.random() * 100;
      s3.litChars = s3.chant.length;
    }
  } else {
    // Red phase - must stop
    if (s3.phaseTimer < 15) {
      s3.haechiAngle = lerp(0, Math.PI, s3.phaseTimer / 15);
    } else {
      s3.looking = true;
    }
    if (s3.phaseTimer >= s3.lookDuration) {
      s3.phase = 'transition';
      s3.phaseTimer = 0;
      s3.haechiAngle = 0;
      s3.looking = false;
      s3.litChars = 0;
      // Highly random transition: 0.5~3초, 예측 불가
      const roll = Math.random();
      if (roll < 0.25) {
        s3.transitionDuration = 30 + Math.random() * 25;   // 급속 (0.5~0.9초)
      } else if (roll < 0.45) {
        s3.transitionDuration = 130 + Math.random() * 50;  // 느림 (2.2~3초)
      } else {
        s3.transitionDuration = 55 + Math.random() * 75;   // 중간 (0.9~2.2초)
      }
    }
  }

  // Player movement (hold space)
  s3.moving = keys['Space'];
  if (s3.moving) {
    s3.distance += 3;
  }

  // Caught detection — knocked back by distance
  if (s3.looking && s3.moving && s3.invincible <= 0) {
    takeDamage('haechi');
    s3.invincible = 90;
    s3.distance = Math.max(0, s3.distance - 150);
  }

  // Win condition
  if (s3.distance >= s3.totalDist) {
    s3.won = true;
    s3.winTimer = 0;
    score += 500;
  }
}

function drawStage3() {
  // Background: palace courtyard
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#ff8a65');
  grad.addColorStop(0.3, '#ffccbc');
  grad.addColorStop(1, '#d7ccc8');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Palace decoration at top
  drawPalaceRoof(W / 2, 30, 400);
  ctx.fillStyle = '#795548';
  ctx.fillRect(50, 65, W - 100, 80);
  ctx.fillStyle = '#5d4037';
  for (let x = 80; x < W - 80; x += 80) {
    ctx.fillRect(x, 75, 40, 45);
    ctx.fillStyle = '#4e342e';
    ctx.fillRect(x + 5, 80, 30, 30);
    ctx.fillStyle = '#5d4037';
  }

  // 무궁화꽃이피었습니다 chant display
  const chantY = 170;
  const chant = s3.chant;
  const totalCW = chant.length * 28;
  const chantStartX = (W - totalCW) / 2;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.beginPath();
  ctx.roundRect(chantStartX - 10, chantY - 18, totalCW + 20, 40, 8);
  ctx.fill();
  for (let i = 0; i < chant.length; i++) {
    const cx = chantStartX + i * 28 + 14;
    const lit = i < s3.litChars;
    ctx.font = `bold 20px 'Noto Sans KR', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (lit) {
      ctx.fillStyle = '#ff5252';
      ctx.shadowColor = '#ff5252';
      ctx.shadowBlur = 10;
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.shadowBlur = 0;
    }
    ctx.fillText(chant[i], cx, chantY);
  }
  ctx.shadowBlur = 0;

  // Status text
  if (s3.phase === 'transition') {
    drawText(t('move'), W / 2, 215, 22, '#4caf50');
  } else if (s3.looking) {
    drawText(t('stop_cmd'), W / 2, 215, 22, '#f44336');
  }

  // Draw 3-row winding path
  const sx = s3.pathStartX, ex = s3.pathEndX;
  const pathH = 40;
  for (let r = 0; r < 3; r++) {
    const ry = s3.rows[r].y;
    // Path strip
    ctx.fillStyle = '#a1887f';
    ctx.fillRect(sx, ry - pathH / 2, ex - sx, pathH);
    // Tile lines
    ctx.fillStyle = '#8d6e63';
    for (let x = sx; x < ex; x += 40) {
      ctx.fillRect(x, ry - pathH / 2, 2, pathH);
    }
    // Direction arrows
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const arrow = s3.rows[r].dir === 1 ? '→' : '←';
    for (let ax = sx + 40; ax < ex - 20; ax += 80) {
      ctx.fillText(arrow, ax, ry);
    }
  }
  // Vertical connectors between rows
  ctx.fillStyle = '#a1887f';
  // Row 1→2 connector (right side)
  ctx.fillRect(ex - pathH, s3.rows[0].y - pathH / 2, pathH, s3.rows[1].y - s3.rows[0].y + pathH);
  // Row 2→3 connector (left side)
  ctx.fillRect(sx, s3.rows[1].y - pathH / 2, pathH, s3.rows[2].y - s3.rows[1].y + pathH);

  // Haechi statue at the end of row 3
  const haechiPos = getS3Pos(s3.totalDist);
  ctx.save();
  ctx.translate(haechiPos.x + 25, haechiPos.y);
  ctx.scale(s3.looking ? -1 : 1, 1);
  drawEmoji('🦁', 0, 0, 40);
  ctx.restore();

  // Player
  const pos = getS3Pos(s3.distance);
  const blink = s3.invincible > 0 && Math.floor(s3.invincible / 4) % 2;
  if (!blink) drawPlayer(pos.x, pos.y, 32);

  // Progress bar
  const prog = s3.distance / s3.totalDist;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(50, H - 20, W - 100, 10);
  ctx.fillStyle = '#9c27b0';
  ctx.fillRect(50, H - 20, (W - 100) * Math.min(1, prog), 10);

  // Hint
  if (frameCount % 120 < 60) {
    drawText(t('space_to_move'), W / 2, H - 40, 13, 'rgba(0,0,0,0.5)');
  }

  // Win message
  if (s3.won) {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, 0, W, H);
    drawText(t('clear'), W / 2, H / 2, 48, '#ffd54f');
  }
}

// STAGE 4: COFFEE DEFENSE (RHYTHM)
// ============================================================
let s4 = {};
function initStage4() {
  s4 = {
    lanes: [
      { key: 'KeyA', label: 'A', x: W / 2 - 150, cups: [] },
      { key: 'KeyS', label: 'S', x: W / 2 - 50, cups: [] },
      { key: 'KeyD', label: 'D', x: W / 2 + 50, cups: [] },
      { key: 'KeyF', label: 'F', x: W / 2 + 150, cups: [] }
    ],
    hitZoneY: H - 100,
    timer: 0,
    duration: 1200,
    spawnTimer: 0,
    hitEffects: [],
    invincible: 0,
    keyFlash: {} // which keys are flashing
  };
}

function updateStage4() {
  s4.timer++;
  if (s4.invincible > 0) s4.invincible--;

  // Spawn cups
  s4.spawnTimer++;
  const rate = Math.max(8, 30 - Math.floor(s4.timer / 120) * 2);
  if (s4.spawnTimer >= rate) {
    s4.spawnTimer = 0;
    const laneIdx = Math.floor(Math.random() * 4);
    const types = [
      { emoji: '🧋', speed: 3, name: 'latte' },
      { emoji: '☕', speed: 5, name: 'americano' },
      { emoji: '🧊', speed: 7, name: 'iced' }
    ];
    const t = types[Math.floor(Math.random() * types.length)];
    s4.lanes[laneIdx].cups.push({
      y: -30,
      speed: t.speed,
      emoji: t.emoji,
      type: t.name,
      hit: false,
      hitAnim: 0
    });
  }

  // Update cups and check hits
  s4.lanes.forEach((lane, li) => {
    lane.cups = lane.cups.filter(cup => {
      if (cup.hit) {
        cup.hitAnim++;
        return cup.hitAnim < 20;
      }
      cup.y += cup.speed;
      // Missed - past hit zone
      if (cup.y > H + 20) {
        if (s4.invincible <= 0) {
          takeDamage('coffee');
          s4.invincible = 30;
        }
        return false;
      }
      return true;
    });
  });

  // Key press detection
  s4.lanes.forEach((lane, li) => {
    if (keysJustPressed[lane.key]) {
      s4.keyFlash[lane.key] = 10;
      // Find closest cup in hit zone
      let closest = null;
      let closestDist = Infinity;
      lane.cups.forEach(cup => {
        if (cup.hit) return;
        const dist = Math.abs(cup.y - s4.hitZoneY);
        if (dist < 60 && dist < closestDist) {
          closest = cup;
          closestDist = dist;
        }
      });
      if (closest) {
        closest.hit = true;
        closest.hitAnim = 0;
        const bonus = closestDist < 20 ? 100 : closestDist < 40 ? 50 : 25;
        score += bonus;
        s4.hitEffects.push({ x: lane.x, y: s4.hitZoneY, timer: 0, text: bonus >= 100 ? 'PERFECT!' : bonus >= 50 ? 'GREAT!' : 'OK' });
      } else {
        // Miss penalty: no cup nearby
        score -= 30;
        s4.hitEffects.push({ x: lane.x, y: s4.hitZoneY, timer: 0, text: 'MISS!' });
      }
    }
  });

  // Update key flash
  Object.keys(s4.keyFlash).forEach(k => {
    if (s4.keyFlash[k] > 0) s4.keyFlash[k]--;
  });

  // Update hit effects
  s4.hitEffects = s4.hitEffects.filter(e => { e.timer++; return e.timer < 30; });

  if (s4.timer >= s4.duration && hp > 0) advanceStage();
}

function drawStage4() {
  // Background: cafe
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#3e2723');
  grad.addColorStop(0.5, '#4e342e');
  grad.addColorStop(1, '#5d4037');
  ctx.fillStyle = grad;

  // Cafe lights
  for (let i = 0; i < 5; i++) {

    ctx.fill();
    drawEmoji('💡', lx, 30, 20);
  }

  // Seongsu text
  drawText(t('seongsu'), W / 2, 70, 14, 'rgba(255,183,77,0.5)');

  // Lane lines
  s4.lanes.forEach((lane, li) => {
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillRect(lane.x - 35, 90, 70, H - 130);

    // Lane guide line
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.moveTo(lane.x, 90);
    ctx.lineTo(lane.x, H - 50);
    ctx.stroke();
    ctx.setLineDash([]);

    // Hit zone
    const flash = s4.keyFlash[lane.key] > 0;
    ctx.strokeStyle = flash ? '#ffeb3b' : 'rgba(255,255,255,0.3)';
    ctx.lineWidth = flash ? 4 : 2;
    ctx.beginPath();
    ctx.arc(lane.x, s4.hitZoneY, 30, 0, Math.PI * 2);
    ctx.stroke();

    // Key label
    ctx.fillStyle = flash ? '#ffeb3b' : 'rgba(255,255,255,0.5)';
    ctx.font = `bold 24px 'Noto Sans KR', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(lane.label, lane.x, H - 40);

    // Cups
    lane.cups.forEach(cup => {
      if (cup.hit) {
        const alpha = 1 - cup.hitAnim / 20;
        ctx.globalAlpha = alpha;
        drawEmoji('💥', lane.x, cup.y, 28);
        ctx.globalAlpha = 1;
      } else {
        drawEmoji(cup.emoji, lane.x, cup.y, 30);
      }
    });
  });

  // Player at bottom center
  drawPlayer(W / 2, H - 60, 32);

  // Hit effects
  s4.hitEffects.forEach(e => {
    const alpha = 1 - e.timer / 30;
    const color = e.text === 'PERFECT!' ? '#ffeb3b' : e.text === 'GREAT!' ? '#4caf50' : '#ff9800';
    drawText(e.text, e.x, s4.hitZoneY - 40 - e.timer, 18, `rgba(${color === '#ffeb3b' ? '255,235,59' : color === '#4caf50' ? '76,175,80' : '255,152,0'},${alpha})`);
  });

  // Progress
  const prog = s4.timer / s4.duration;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(50, H - 15, W - 100, 8);
  ctx.fillStyle = '#ff9800';
  ctx.fillRect(50, H - 15, (W - 100) * prog, 8);
}

// STAGE 5: CHOPSTICK BOSS
// ============================================================
let s5 = {};
function initStage5() {
  s5 = {
    playerX: W / 2,
    playerY: H - 80,
    bossHP: 5,
    bossMaxHP: 5,
    chopsticks: [],
    attackTimer: 0,
    phase: 'idle', // idle, telegraph, strike, stuck
    stuckTimer: 0,
    stuckX: 0,
    shadowX: 0,
    shadowX2: 0,        // second chopstick (rage mode)
    shadowAlpha: 0,
    invincible: 0,
    hits: 0,
    shakeTimer: 0,
    won: false,
    winTimer: 0,
    rage: false,          // rage mode after 2 hits
    kickCount: 0,         // kicks landed on stuck chopstick
    kicksNeeded: 2,       // need multiple kicks
    stuckX2: 0,           // second stuck chopstick
    doubleAttack: false    // whether current attack is double
  };
}

function updateStage5() {
  if (s5.won) {
    s5.winTimer++;
    if (s5.winTimer > 120) advanceStage();
    return;
  }
  if (s5.invincible > 0) s5.invincible--;

  // Player movement
  const speed = 5;
  if (keys['ArrowLeft'] || keys['KeyA']) s5.playerX -= speed;
  if (keys['ArrowRight'] || keys['KeyD']) s5.playerX += speed;
  s5.playerX = Math.max(40, Math.min(W - 40, s5.playerX));

  s5.attackTimer++;
  // Rage mode after 2 hits: faster attacks, double chopstick
  if (s5.hits >= 2 && !s5.rage) {
    s5.rage = true;
    s5.kicksNeeded = 3;
  }
  const idleTime = s5.rage ? 35 : 60;
  const telegraphTime = s5.rage ? 25 : 40;
  const stuckTime = s5.rage ? 45 : 60;

  switch (s5.phase) {
    case 'idle':
      if (s5.attackTimer > idleTime) {
        s5.phase = 'telegraph';
        s5.attackTimer = 0;
        s5.shadowX = s5.playerX + (Math.random() - 0.5) * 100;
        s5.doubleAttack = s5.rage && Math.random() < 0.5;
        if (s5.doubleAttack) {
          s5.shadowX2 = s5.playerX + (Math.random() > 0.5 ? 1 : -1) * (150 + Math.random() * 100);
          s5.shadowX2 = Math.max(60, Math.min(W - 60, s5.shadowX2));
        }
        s5.shadowAlpha = 0;
      }
      break;

    case 'telegraph':
      s5.shadowAlpha = Math.min(0.8, s5.shadowAlpha + (s5.rage ? 0.05 : 0.03));
      if (s5.attackTimer > telegraphTime) {
        s5.phase = 'strike';
        s5.attackTimer = 0;
      }
      break;

    case 'strike':
      if (s5.attackTimer >= 10) {
        const pRect = { x: s5.playerX - 18, y: s5.playerY - 18, w: 36, h: 36 };
        const sRect = { x: s5.shadowX - 25, y: H - 120, w: 50, h: 80 };
        if (rectCollision(pRect, sRect) && s5.invincible <= 0) {
          takeDamage('chopstick');
          s5.invincible = 60;
          s5.shakeTimer = 15;
        }
        if (s5.doubleAttack) {
          const sRect2 = { x: s5.shadowX2 - 25, y: H - 120, w: 50, h: 80 };
          if (rectCollision(pRect, sRect2) && s5.invincible <= 0) {
            takeDamage('chopstick');
            s5.invincible = 60;
            s5.shakeTimer = 15;
          }
        }
        s5.phase = 'stuck';
        s5.stuckX = s5.shadowX;
        s5.stuckX2 = s5.doubleAttack ? s5.shadowX2 : 0;
        s5.stuckTimer = 0;
        s5.kickCount = 0;
        s5.attackTimer = 0;
      }
      break;

    case 'stuck':
      s5.stuckTimer++;
      // Player kicks — need multiple kicks
      if (keysJustPressed['Space'] && Math.abs(s5.playerX - s5.stuckX) < 60) {
        s5.kickCount++;
        s5.shakeTimer = 8;
        score += 50;
        if (s5.kickCount >= s5.kicksNeeded) {
          s5.bossHP--;
          s5.hits++;
          score += 200;
          s5.shakeTimer = 20;
          if (s5.bossHP <= 0) {
            s5.won = true;
            s5.winTimer = 0;
            score += 1000;
          }
          s5.phase = 'idle';
          s5.attackTimer = 0;
        }
      }
      if (s5.stuckTimer > stuckTime) {
        s5.phase = 'idle';
        s5.attackTimer = 0;
      }
      break;
  }

  if (s5.shakeTimer > 0) s5.shakeTimer--;
}

function drawStage5() {
  // Background: dark arena
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0d0d0d');
  grad.addColorStop(0.5, '#1a1a2e');
  grad.addColorStop(1, '#16213e');

  ctx.fillRect(0, 0, W, H);

  // Screen shake
  if (s5.shakeTimer > 0) {
    ctx.save();
    ctx.translate(Math.random() * 6 - 3, Math.random() * 6 - 3);
  }

  // Arena floor
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, H - 40, W, 40);
  ctx.fillStyle = '#333';
  for (let x = 0; x < W; x += 50) {
    ctx.fillRect(x, H - 40, 25, 3);
  }

  // Spotlight
  const spotGrad = ctx.createRadialGradient(W / 2, 50, 10, W / 2, 50, 400);
  spotGrad.addColorStop(0, 'rgba(255,235,59,0.15)');
  spotGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = spotGrad;
  ctx.fillRect(0, 0, W, H);

  // Boss HP bar
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(200, 60, 400, 25);
  ctx.strokeStyle = '#f44336';
  ctx.lineWidth = 2;
  ctx.strokeRect(200, 60, 400, 25);
  const hpPct = s5.bossHP / s5.bossMaxHP;
  ctx.fillStyle = hpPct > 0.5 ? '#f44336' : hpPct > 0.25 ? '#ff9800' : '#ff5722';
  ctx.fillRect(202, 62, 396 * hpPct, 21);
  drawText(t('boss_label'), W / 2, 72, 14, '#fff');

  // Giant chopsticks at top
  drawEmoji('🥢', W / 2 - 30, 30, 40);
  drawEmoji('🥢', W / 2 + 30, 30, 40);

  // Rage mode indicator
  if (s5.rage) {
    drawText('🔥 RAGE', W / 2, 95, 12, '#ff5722');
  }

  // Shadow / telegraph
  if (s5.phase === 'telegraph') {
    ctx.fillStyle = `rgba(255,0,0,${s5.shadowAlpha * 0.3})`;
    ctx.beginPath();
    ctx.ellipse(s5.shadowX, H - 50, 30, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    drawText('⚠️', s5.shadowX, H - 80, 24, `rgba(255,0,0,${s5.shadowAlpha})`);
    // Double attack telegraph
    if (s5.doubleAttack) {
      ctx.fillStyle = `rgba(255,0,0,${s5.shadowAlpha * 0.3})`;
      ctx.beginPath();
      ctx.ellipse(s5.shadowX2, H - 50, 30, 10, 0, 0, Math.PI * 2);
      ctx.fill();
      drawText('⚠️', s5.shadowX2, H - 80, 24, `rgba(255,0,0,${s5.shadowAlpha})`);
    }
  }

  // Chopstick strike animation
  if (s5.phase === 'strike') {
    const progress = s5.attackTimer / 10;
    const chopY = lerp(-50, H - 80, progress);
    drawEmoji('🥢', s5.shadowX - 10, chopY, 50);
    drawEmoji('🥢', s5.shadowX + 10, chopY, 50);
    if (s5.doubleAttack) {
      drawEmoji('🥢', s5.shadowX2 - 10, chopY, 50);
      drawEmoji('🥢', s5.shadowX2 + 10, chopY, 50);
    }
  }

  // Stuck chopsticks
  if (s5.phase === 'stuck') {
    drawEmoji('🥢', s5.stuckX - 10, H - 80, 50);
    drawEmoji('🥢', s5.stuckX + 10, H - 80, 50);
    if (s5.doubleAttack) {
      drawEmoji('🥢', s5.stuckX2 - 10, H - 80, 50);
      drawEmoji('🥢', s5.stuckX2 + 10, H - 80, 50);
    }
    // Kick hint with counter
    if (Math.abs(s5.playerX - s5.stuckX) < 60) {
      const alpha = Math.sin(frameCount * 0.1) * 0.3 + 0.7;
      drawText(`SPACE x${s5.kicksNeeded - s5.kickCount}`, s5.stuckX, H - 130, 16, `rgba(255,235,59,${alpha})`);
    }
    // Stuck timer bar
    const stuckTime = s5.rage ? 45 : 60;
    const stPct = 1 - s5.stuckTimer / stuckTime;
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(s5.stuckX - 30, H - 60, 60, 5);
    ctx.fillStyle = '#ffeb3b';
    ctx.fillRect(s5.stuckX - 30, H - 60, 60 * stPct, 5);
  }

  // Player
  const blink = s5.invincible > 0 && Math.floor(s5.invincible / 4) % 2;
  if (!blink) drawPlayer(s5.playerX, s5.playerY, 38);

  if (s5.shakeTimer > 0) ctx.restore();

  // Win message
  if (s5.won) {
    const alpha = Math.min(1, s5.winTimer / 60);
    ctx.fillStyle = `rgba(0,0,0,${alpha * 0.5})`;
    ctx.fillRect(0, 0, W, H);
    drawText(t('victory'), W / 2, H / 2 - 30, 56, `rgba(255,215,0,${alpha})`);
    drawText(t('became_legend'), W / 2, H / 2 + 40, 22, `rgba(255,255,255,${alpha})`);
  }
}

function initStage(n) {
  switch (n) {

let audioCtx = null;
function ensureAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playKick(time) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(150, time);
  osc.frequency.exponentialRampToValueAtTime(40, time + 0.1);
  gain.gain.setValueAtTime(0.5, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(time);
  osc.stop(time + 0.15);
}

function playPunchHit() {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(800, t0);
  osc.frequency.exponentialRampToValueAtTime(200, t0 + 0.08);
  gain.gain.setValueAtTime(0.6, t0);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.1);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t0);
  osc.stop(t0 + 0.1);
  // Noise burst
  const bufSize = audioCtx.sampleRate * 0.05;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const ng = audioCtx.createGain();
  ng.gain.setValueAtTime(0.4, t0);
  ng.gain.exponentialRampToValueAtTime(0.001, t0 + 0.06);
  noise.connect(ng);
  ng.connect(audioCtx.destination);
  noise.start(t0);
  noise.stop(t0 + 0.06);
}

function playUppercutHit() {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(200, t0);
  osc.frequency.exponentialRampToValueAtTime(1200, t0 + 0.2);
  gain.gain.setValueAtTime(0.5, t0);
  gain.gain.linearRampToValueAtTime(0.6, t0 + 0.1);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.35);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t0);
  osc.stop(t0 + 0.35);
}

function playMissSound() {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(100, t0);
  osc.frequency.linearRampToValueAtTime(60, t0 + 0.3);
  gain.gain.setValueAtTime(0.3, t0);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.3);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t0);
  osc.stop(t0 + 0.3);
}

const BONUS_OBJ_EMOJIS = ['☕', '🏹', '🕊️'];
let bonus = {};
let bonusKickScheduled = [];

function initBonusGame() {
  ensureAudioCtx();
  bonus = {
    startTime: 0,
    elapsed: 0,
    objects: [],
    nextBeatIdx: 0,
    score: 0,
    perfects: 0,
    oks: 0,
    misses: 0,
    streak: 0,
    maxStreak: 0,
    feedbacks: [],
    explosions: [],
    playerAnim: 'idle', // idle, punch, uppercut, flinch
    playerAnimTimer: 0,
    comboHolding: false,
    comboActive: false,
    flashTimer: 0,
    flashColor: '',
    bgPulse: 0,
    finished: false,
    beatCount: 0,
    started: false,
    introTimer: 0,
    spamMisses: 0,
    lastMissTime: 0
  };
  bonusKickScheduled = [];
  // When called as a stage, use STAGE_INTRO flow; only use BONUS_INTRO for standalone
  if (gameState === STATE.PLAYING || gameState === STATE.STAGE_INTRO) {
    // Called from stage init - go straight to bonus intro to wait for space
    gameState = STATE.BONUS_INTRO;
  } else {
    gameState = STATE.BONUS_INTRO;
  }
}

function startBonusPlay() {
  bonus.started = true;
  bonus.startTime = audioCtx.currentTime;
  // Schedule kick drum beats
  const totalBeats = Math.ceil(42 / BEAT_INTERVAL);
  for (let i = 0; i < totalBeats; i++) {
    const beatTime = bonus.startTime + i * BEAT_INTERVAL;
    playKick(beatTime);
  }
  // Spawn objects from beat map
  bonus.objects = BONUS_BEAT_MAP.map(b => {
    const emojiIdx = b.type === 'combo_start' ? -1 : (b.type === 'combo_end' ? -2 : Math.floor(Math.random() * 3));
    return {
      time: b.time,
      type: b.type,
      emoji: b.type === 'combo_start' ? '💡' : (b.type === 'combo_end' ? '💡' : BONUS_OBJ_EMOJIS[emojiIdx]),
      x: W + 50,
      targetX: 150,
      y: 320,
      hit: false,
      missed: false,
      judged: false,
      flyTime: 1.5 // seconds to travel from right to player
    };
  });
  gameState = STATE.BONUS;
}

function updateBonus() {
  if (!bonus.started || bonus.finished) return;
  bonus.elapsed = audioCtx.currentTime - bonus.startTime;
  bonus.bgPulse = Math.sin(bonus.elapsed * Math.PI * 2 * (BONUS_BPM / 60)) * 0.5 + 0.5;

  // Update object positions
  bonus.objects.forEach(obj => {
    if (obj.hit || obj.missed) return;
    const timeUntilBeat = obj.time - bonus.elapsed;
    if (timeUntilBeat < obj.flyTime && timeUntilBeat > -0.5) {
      const progress = 1 - (timeUntilBeat / obj.flyTime);
      obj.x = lerp(W + 50, obj.targetX, Math.max(0, Math.min(1, progress)));
    }
    // Auto-miss if past timing window
    if (timeUntilBeat < -0.2 && !obj.judged) {
      obj.missed = true;
      obj.judged = true;
      bonus.misses++;
      bonus.streak = 0;
      bonus.feedbacks.push({ text: t('bonus_miss'), x: obj.targetX, y: obj.y - 40, timer: 0, color: '#f44336' });
      playMissSound();
      bonus.playerAnim = 'flinch';
      bonus.playerAnimTimer = 20;
      bonus.flashTimer = 10;
      bonus.flashColor = 'rgba(255,0,0,0.2)';
      takeDamage('rhythm');
      if (hp <= 0) return;
    }
  });

  // Space press = punch
  if (keysJustPressed['Space'] && !bonus.comboHolding) {
    // Check for combo_start first
    const comboStart = bonus.objects.find(o => o.type === 'combo_start' && !o.judged && Math.abs(o.time - bonus.elapsed) < 0.2);
    if (comboStart) {
      bonus.comboHolding = true;
      bonus.comboActive = true;
    } else {
      // Normal punch
      const target = bonus.objects.find(o => o.type === 'normal' && !o.judged && Math.abs(o.time - bonus.elapsed) < 0.2);
      if (target) {
        const diff = Math.abs(target.time - bonus.elapsed);
        target.hit = true;
        target.judged = true;
        if (diff < 0.08) {
          bonus.perfects++;
          bonus.score += 100;
          score += 100;
          bonus.feedbacks.push({ text: 'PERFECT!', x: target.targetX, y: target.y - 40, timer: 0, color: '#ffeb3b' });
        } else {
          bonus.oks++;
          bonus.score += 50;
          score += 50;
          bonus.feedbacks.push({ text: 'OK!', x: target.targetX, y: target.y - 40, timer: 0, color: '#4caf50' });
        }
        bonus.streak++;
        bonus.maxStreak = Math.max(bonus.maxStreak, bonus.streak);
        bonus.spamMisses = 0; // reset spam counter on hit
        bonus.explosions.push({ x: target.targetX, y: target.y, timer: 0, big: false });
        playPunchHit();
        bonus.playerAnim = 'punch';
        bonus.playerAnimTimer = 15;
      } else {
        // MISS PENALTY: pressed Space with no valid target
        bonus.score -= 50;
        score -= 50;
        bonus.misses++;
        bonus.streak = 0;
        bonus.feedbacks.push({ text: 'MISS!', x: 150, y: 280, timer: 0, color: '#f44336' });
        playMissSound();
        bonus.playerAnim = 'flinch';
        bonus.playerAnimTimer = 15;
        bonus.flashTimer = 8;
        bonus.flashColor = 'rgba(255,0,0,0.2)';
        // Spam detection: 3 consecutive misses within 1 second = lose 1 HP
        const now = bonus.elapsed;
        if (now - bonus.lastMissTime < 1.0) {
          bonus.spamMisses++;
        } else {
          bonus.spamMisses = 1;
        }
        bonus.lastMissTime = now;
        if (bonus.spamMisses >= 3) {
          takeDamage('rhythm');
          bonus.spamMisses = 0;
          if (hp <= 0) return; // death handled by takeDamage
        }
      }
    }
  }

  // Space held for combo
  if (bonus.comboHolding && keys['Space']) {
    // Mark combo_start as hit if not already
    const cs = bonus.objects.find(o => o.type === 'combo_start' && !o.judged);
    if (cs && Math.abs(cs.time - bonus.elapsed) < 0.2) {
      cs.hit = true;
      cs.judged = true;
    }
  }

  // Space released = uppercut for combo_end
  if (bonus.comboHolding && !keys['Space']) {
    bonus.comboHolding = false;
    bonus.comboActive = false;
    const comboEnd = bonus.objects.find(o => o.type === 'combo_end' && !o.judged);
    if (comboEnd && Math.abs(comboEnd.time - bonus.elapsed) < 0.2) {
      const diff = Math.abs(comboEnd.time - bonus.elapsed);
      comboEnd.hit = true;
      comboEnd.judged = true;
      if (diff < 0.08) {
        bonus.perfects++;
        bonus.score += 200;
        bonus.feedbacks.push({ text: 'PERFECT!', x: comboEnd.targetX, y: comboEnd.y - 50, timer: 0, color: '#ffeb3b' });
      } else {
        bonus.oks++;
        bonus.score += 100;
        bonus.feedbacks.push({ text: 'OK!', x: comboEnd.targetX, y: comboEnd.y - 50, timer: 0, color: '#4caf50' });
      }
      bonus.streak++;
      bonus.maxStreak = Math.max(bonus.maxStreak, bonus.streak);
      bonus.explosions.push({ x: comboEnd.targetX, y: comboEnd.y, timer: 0, big: true });
      playUppercutHit();
      bonus.playerAnim = 'uppercut';
      bonus.playerAnimTimer = 25;
      bonus.flashTimer = 8;
      bonus.flashColor = 'rgba(255,255,0,0.3)';
    }
  }

  // Update feedbacks
  bonus.feedbacks = bonus.feedbacks.filter(f => { f.timer++; return f.timer < 40; });
  // Update explosions
  bonus.explosions = bonus.explosions.filter(ex => { ex.timer++; return ex.timer < 25; });
  // Update player anim
  if (bonus.playerAnimTimer > 0) bonus.playerAnimTimer--;
  else bonus.playerAnim = 'idle';
  // Update flash
  if (bonus.flashTimer > 0) bonus.flashTimer--;

  // Check if beat map is complete
  if (bonus.elapsed > 42) {
    bonus.finished = true;
    if (hp > 0) {
      advanceStage();
    }
  }
}

function drawBonus() {
  // Background with pulse
  const baseBright = 25 + bonus.bgPulse * 15;
  ctx.fillStyle = `rgb(${baseBright}, ${baseBright * 0.5}, ${baseBright * 1.5})`;
  ctx.fillRect(0, 0, W, H);

  // Flash overlay
  if (bonus.flashTimer > 0) {
    ctx.fillStyle = bonus.flashColor;
    ctx.fillRect(0, 0, W, H);
  }

  // Floor
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 420, W, 180);
  ctx.fillStyle = '#222';
  for (let x = 0; x < W; x += 60) {
    ctx.fillRect(x, 420, 30, 3);
  }

  // Beat line at player position
  ctx.strokeStyle = `rgba(255,255,255,${0.1 + bonus.bgPulse * 0.15})`;
  ctx.lineWidth = 2;
  ctx.setLineDash([5, 5]);
  ctx.beginPath();
  ctx.moveTo(150, 200);
  ctx.lineTo(150, 420);
  ctx.stroke();
  ctx.setLineDash([]);

  // Objects
  bonus.objects.forEach(obj => {
    if (obj.judged) return;
    const timeUntilBeat = obj.time - bonus.elapsed;
    if (timeUntilBeat > obj.flyTime || timeUntilBeat < -0.5) return;

    const sz = obj.type === 'combo_start' || obj.type === 'combo_end' ? 40 : 34;
    drawEmoji(obj.emoji, obj.x, obj.y, sz);

    // Combo glow
    if (obj.type === 'combo_start' || obj.type === 'combo_end') {
      ctx.fillStyle = `rgba(255,235,59,${0.2 + Math.sin(frameCount * 0.15) * 0.15})`;
      ctx.beginPath();
      ctx.arc(obj.x, obj.y, 25, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  // Explosions
  bonus.explosions.forEach(ex => {
    const alpha = 1 - ex.timer / 25;
    const sz = ex.big ? 50 + ex.timer * 3 : 30 + ex.timer * 2;
    ctx.globalAlpha = alpha;
    drawEmoji('💥', ex.x, ex.y, sz);
    if (ex.big) {
      // Extra particles for uppercut
      for (let i = 0; i < 4; i++) {
        const angle = (i / 4) * Math.PI * 2 + ex.timer * 0.1;
        const dist = ex.timer * 4;
        drawEmoji('✨', ex.x + Math.cos(angle) * dist, ex.y + Math.sin(angle) * dist, 16);
      }
    }
    ctx.globalAlpha = 1;
  });

  // Player
  const playerX = 150;
  const bobY = 320 + Math.sin(bonus.elapsed * Math.PI * 2 * (BONUS_BPM / 60)) * 5;
  ctx.save();
  if (bonus.playerAnim === 'punch') {
    ctx.translate(playerX + 15, bobY - 5);
    ctx.rotate(-0.2);
    drawPlayer(0, 0, 48);
  } else if (bonus.playerAnim === 'uppercut') {
    ctx.translate(playerX, bobY - 20 - bonus.playerAnimTimer);
    ctx.rotate(-0.4);
    drawPlayer(0, 0, 52);
  } else if (bonus.playerAnim === 'flinch') {
    ctx.translate(playerX - 10, bobY + 5);
    ctx.rotate(0.15);
    drawPlayer(0, 0, 44);
  } else {
    drawPlayer(playerX, bobY, 46);
  }
  ctx.restore();

  // Combo holding indicator
  if (bonus.comboHolding) {
    const pulseAlpha = 0.5 + Math.sin(frameCount * 0.3) * 0.3;
    ctx.strokeStyle = `rgba(255,235,59,${pulseAlpha})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(playerX, bobY, 35, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Feedbacks
  bonus.feedbacks.forEach(f => {
    const alpha = 1 - f.timer / 40;
    const yOff = f.timer * 1.5;
    ctx.globalAlpha = alpha;
    drawText(f.text, f.x + 60, f.y - yOff, 22, f.color);
    ctx.globalAlpha = 1;
  });

  // HUD
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, 45);
  // HP hearts
  for (let i = 0; i < 3; i++) {
    drawEmoji(i < hp ? '❤️' : '🖤', 30 + i * 35, 22, 22);
  }
  drawText(`${t('score')}: ${score}`, 150, 22, 18, '#ffeb3b', 'left');
  drawText(`${t('bonus_streak')}: ${bonus.streak}`, W - 120, 22, 16, '#ff9800', 'right');

  // Beat progress bar
  const prog = bonus.elapsed / 42;
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(50, H - 15, W - 100, 8);
  ctx.fillStyle = '#ff9800';
  ctx.fillRect(50, H - 15, (W - 100) * Math.min(1, prog), 8);
}

function drawBonusResult() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a0a2e');
  grad.addColorStop(1, '#0d0521');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (let i = 0; i < 20; i++) {
    const sx = (i * 137 + frameCount * 0.3) % W;
    const sy = (i * 97) % (H * 0.3);
    ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.sin(frameCount * 0.05 + i) * 0.3})`;
    ctx.fillRect(sx, sy, 2, 2);
  }

  drawText(t('bonus_result'), W / 2, 80, 36, '#ff9800');
  drawText(t('bonus_title'), W / 2, 120, 18, '#ffab91');

  // Score
  drawText(`${t('score')}: ${bonus.score}`, W / 2, 190, 32, '#ffeb3b');

  // Accuracy
  const total = bonus.perfects + bonus.oks + bonus.misses;
  const accuracy = total > 0 ? Math.round(((bonus.perfects + bonus.oks) / total) * 100) : 0;
  drawText(`${t('bonus_accuracy')}: ${accuracy}%`, W / 2, 240, 22, '#e0e0e0');

  // Breakdown
  drawText(`${t('bonus_perfect')}: ${bonus.perfects}`, W / 2, 300, 18, '#ffeb3b');
  drawText(`${t('bonus_ok')}: ${bonus.oks}`, W / 2, 330, 18, '#4caf50');
  drawText(`${t('bonus_miss')}: ${bonus.misses}`, W / 2, 360, 18, '#f44336');
  drawText(`${t('bonus_streak')}: ${bonus.maxStreak}`, W / 2, 400, 18, '#ff9800');

  // Grade
  let grade = 'C';
  if (accuracy >= 95 && bonus.misses <= 2) grade = 'S';
  else if (accuracy >= 85) grade = 'A';
  else if (accuracy >= 70) grade = 'B';
  const gradeColor = grade === 'S' ? '#ffd54f' : grade === 'A' ? '#4caf50' : grade === 'B' ? '#42a5f5' : '#9e9e9e';
  drawText(grade, W / 2, 440, 48, gradeColor);

  // Back button
  const bx = 250, by = 480, bw = 300, bh = 60;
  const hover = mouseX > bx && mouseX < bx + bw && mouseY > by && mouseY < by + bh;
  ctx.fillStyle = hover ? '#7b1fa2' : '#4a148c';
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 10);
  ctx.fill();
  drawText(t('bonus_back_title'), W / 2, by + 30, 20, '#fff');
}

// ============================================================
// MAIN GAME LOOP
// ============================================================
function update() {
  switch (gameState) {
    case STATE.PLAYING:
      switch (currentStage) {
        case 0: updateStage1(); break;
        case 1: updateStage2(); break;
        case 2: updateStage4(); break;
        case 3: updateStage5(); break;
        case 4: break; // rhythm stage uses BONUS_INTRO/BONUS states
        case 5: updateStage3(); break;
      }
      break;
    case STATE.BONUS_INTRO:
      updateBonusIntro();
      break;
    case STATE.BONUS:
      updateBonus();
      break;
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  switch (gameState) {
    case STATE.TITLE:
      drawTitle();
      break;
    case STATE.STAGE_INTRO:
      drawStageIntro();
      break;
    case STATE.PLAYING:
      switch (currentStage) {
        case 0: drawStage1(); break;
        case 1: drawStage2(); break;
        case 2: drawStage4(); break;
        case 3: drawStage5(); break;
        case 4: break; // rhythm stage uses BONUS_INTRO/BONUS states
        case 5: drawStage3(); break;
      }
      drawHUD();
      break;
    case STATE.ENDING:
      drawEnding();
      break;
    case STATE.HELP:
      drawHelp();
      break;
    case STATE.BONUS_INTRO:
      drawBonusIntro();
      break;
    case STATE.BONUS:
      drawBonus();
      break;
  }
}

function gameLoop() {
  frameCount++;
  update();
  draw();
  keysJustPressed = {};
  requestAnimationFrame(gameLoop);
}

// Load translations then start
fetch('lang.json')
  .then(r => r.json())
  .then(data => { T = data; gameLoop(); })
  .catch(err => { console.error('lang.json load failed:', err); gameLoop(); });
</script>
